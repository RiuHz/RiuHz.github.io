name: Build & Deploy Portfolio

on:
  push:
    branches: ["main"]

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Create dist structure
        run: |
          mkdir -p dist/css
          mkdir -p dist/javascript

      - name: Generate HTML
        run: node build/generate.js

      - name: Copy static files
        run: |
          cp -r css/*.css dist/css/
          cp -r javascript/*.js dist/javascript/
          cp index.html dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Pages
        uses: actions/deploy-pages@v5
